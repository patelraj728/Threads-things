<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;0,800;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
    --cream:#F5F1EA;
    --cream-2:#EDE8DF;
    --paper:#FAF7F1;
    --ink:#1C1C1A;
    --ink-soft:#3A3733;
    --muted:#7A7068;
    --line:#D8D0C6;
    --sage:#6B7355;
    --accent:#B5651D;
    --accent-h:#8B3E0B;
    --taupe:#B8A68A;
    --success:#3A7D4B;
    --danger:#C0392B;
    --surface:#ffffff;
    --bg:#F5F1EA;
}

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body{

    background:
        radial-gradient(circle at top left,
        rgba(107,115,85,.08),
        transparent 30%),
        var(--bg);

    color:var(--ink);

    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:24px;
}

        .reset-card{

    width:100%;
    max-width:460px;

    background:rgba(255,255,255,.72);

    backdrop-filter:blur(18px);

    border:1px solid var(--line);

    border-radius:32px;

    padding:48px;

    box-shadow:
        0 10px 40px rgba(0,0,0,.05);

    position:relative;

    overflow:hidden;
}

        h1{

    font-family:'Fraunces', serif;

    font-size:clamp(42px,6vw,64px);

    line-height:.95;

    letter-spacing:-.04em;

    font-weight:300;

    margin-bottom:14px;
}

        p.subtitle{

    color:var(--ink-soft);

    font-size:15px;

    line-height:1.7;

    max-width:320px;

    margin:0 auto 34px;
}

        .form-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative; /* Essential for absolute positioning of toggle */
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input[type="password"],
input[type="text"]{

    width:100%;

    height:56px;

    border-radius:16px;

    border:1px solid var(--line);

    background:rgba(255,255,255,.8);

    padding:0 18px;

    padding-right:70px;

    font-size:15px;

    font-weight:500;

    transition:.3s;
}

        input:focus{

    outline:none;

    border-color:var(--sage);

    background:white;

    box-shadow:
        0 0 0 4px rgba(107,115,85,.08);
}

        /* --- TOGGLE STYLING --- */
        .toggle-text{

    position:absolute;

    right:18px;
    top:50%;

    transform:translateY(-50%);

    font-size:11px;

    letter-spacing:.14em;

    text-transform:uppercase;

    color:var(--muted);

    cursor:pointer;

    user-select:none;

    font-weight:700;

    transition:color .25s ease;
}

.toggle-text:hover{

    color:var(--ink);
}

        .toggle-text:hover { color: var(--accent); }

        .btn-update{

    width:100%;

    height:56px;

    border:none;

    border-radius:999px;

    background:var(--ink);

    color:var(--cream);

    cursor:pointer;

    font-size:12px;

    letter-spacing:.2em;

    text-transform:uppercase;

    font-weight:600;

    transition:all .3s ease;

    margin-top:12px;
}

.btn-update:hover{

    background:var(--sage);

    transform:translateY(-2px);
}

        #error{

    display:block;

    margin-bottom:16px;

    font-size:13px;

    font-weight:600;

    color:var(--danger);

    min-height:1.2em;
}

        .back-to-login{

    margin-top:32px;

    display:inline-block;

    color:var(--muted);

    font-size:14px;

    transition:all .25s ease;
}

.back-to-login:hover{

    color:var(--ink);

    transform:translateX(-2px);
}
    

        .reset-card { animation: fadeInUp 0.6s ease-out; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media(max-width:640px){

    .reset-card{

        padding:36px 24px;

        border-radius:24px;
    }

    h1{

        font-size:42px;
    }

}
    </style>
</head>
<body>

    <div class="reset-card">
        <h1>New Password</h1>
        <p class="subtitle">Set a secure password for your account.</p>

        <form id="passwordForm" action="/auth/newpassword" method="post">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <span class="toggle-text" data-target="password">Show</span>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                <span class="toggle-text" data-target="confirm_password">Show</span>
            </div>

            <span id="error"></span>

            <button type="submit" class="btn-update">Update Password</button>
        </form>

        <a href="/auth/login" class="back-to-login">← Back to Login</a>
    </div>

    <script>
        // --- Password Match Validation ---
        document.getElementById("passwordForm").addEventListener("submit", function(e) {
            let pass = document.getElementById("password").value;
            let confirm = document.getElementById("confirm_password").value;
            let error = document.getElementById("error");

            if (pass !== confirm) {
                e.preventDefault(); 
                error.textContent = "Passwords do not match!";
                error.classList.add('animate__animated', 'animate__shakeX');
                setTimeout(() => error.classList.remove('animate__shakeX'), 500);
            } else {
                error.textContent = "";
            }
        });

        // --- Working Show/Hide Toggle ---
        document.querySelectorAll('.toggle-text').forEach(toggle => {
            toggle.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                
                if (input.type === 'password') {
                    input.type = 'text';
                    this.textContent = 'Hide';
                } else {
                    input.type = 'password';
                    this.textContent = 'Show';
                }
            });
        });
    </script>
</body>
</html>
